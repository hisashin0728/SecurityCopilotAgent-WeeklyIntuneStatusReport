  - Format: LogicApp
    Skills:
      - Name: SendWeeklyIntuneReportEmail
        DisplayName: Send Weekly Intune Report Email
        Description: >-
          生成した Intune ステータス HTML レポートを、Office 365 コネクタを持つ
          Azure Logic App 経由で設定済みのメールアドレスに送信します。
