Descriptor:
  Name: WeeklyIntuneStatusReport
  DisplayName: Weekly Intune Status Report
  Description: >-
    Microsoft Intune のデバイス管理データを週次で収集・分析し、デバイス登録数の増減（先週比）、
    OS 別アセット一覧、エラー・非準拠デバイスの検出、管理対象アプリサマリー、
    Intune ポリシーおよびコンプライアンス状況、Windows パッチ遅延分析、
    Defender ウイルス対策（MDAV）エンジンバージョンおよび MDE センサークライアントバージョンの
    分布状況を HTML/CSS メールレポートとして生成する週次エージェントです。
  Settings:
    - Name: LogicAppSubscriptionId
      Label: Logic App Subscription ID
      Description: メール送信用 Logic App がデプロイされている Azure サブスクリプション ID
      HintText: "例: 00000000-0000-0000-0000-000000000000"
      SettingType: String
      Required: true
    - Name: LogicAppResourceGroup
      Label: Logic App Resource Group
      Description: メール送信用 Logic App がデプロイされている Azure リソースグループ名
      HintText: "例: rg-securitycopilot"
      SettingType: String
      Required: true
    - Name: LogicAppWorkflowName
      Label: Logic App Workflow Name
      Description: Intune レポートメール送信用 Logic App のワークフロー名
      HintText: "例: PluginLogicApp_WeeklyIntuneReport"
      SettingType: String
      Required: true

AgentDefinitions:
  - Name: WeeklyIntuneStatusReportAgent
    DisplayName: Weekly Intune Status Report Agent
    Description: >-
      Microsoft Intune のデバイス管理データを週次で収集・分析し、デバイス登録トレンド、
      OS 別アセット一覧、エラー・非準拠デバイスの検出、管理対象アプリサマリー、
      Intune ポリシーおよびコンプライアンス状況、Windows パッチ遅延分析、
      Defender MDAV/MDE エンジンバージョン分布を含む HTML/CSS レポートを生成し、
      メールで送信するエージェントです。
    Publisher: Custom
    Product: Security
    RequiredSkillsets:
      - WeeklyIntuneStatusReport
      - Intune
    AgentSingleInstanceConstraint: Workspace
    Triggers:
      - Name: WeeklySchedule
        DefaultPollPeriodSeconds: 604800
        FetchSkill: ''
        ProcessSkill: WeeklyIntuneStatusReport.OrchestrateWeeklyIntuneReport

SkillGroups:
  # ─────────────────────────────────────────────────
  # Agent Orchestration Skill
  # ─────────────────────────────────────────────────
  - Format: Agent
    Skills:
      - Name: OrchestrateWeeklyIntuneReport
        DisplayName: Orchestrate Weekly Intune Status Report
        Description: >-
          Intune デバイス管理データおよび Defender テレメトリを週次で収集し、
          登録トレンド・OS 別内訳・コンプライアンス状況・アプリインベントリ・
          ポリシー状況・Windows パッチ遅延・Defender エンジンバージョンを分析して
          包括的な HTML/CSS レポートを生成し、メールで送信するオーケストレーションスキルです。
        Interfaces:
          - Agent
        Settings:
          Model: gpt-4.1
          Instructions: |-
            # Mission
            You are a device management analyst agent that analyzes Microsoft Intune
            and Microsoft Defender for Endpoint data on a weekly basis, generates a
            visually rich HTML report with CSS-only charts, and sends it via email.

            All report text must be written in Japanese.

            # Critical Rules
            - **NEVER call multiple skills in parallel.** Always call ONE skill at a time,
              wait for the response, then proceed to the next skill.
            - If a skill call fails or returns an error, do NOT retry.
              Skip that step and move to the next phase.
            - Only call skills listed in ChildSkills. Do not attempt to call
              any other skills.
            - **HTML レポートは必ず簡潔に保つこと。** テーブルの行数は各セクション最大10行に制限する。
              デバイス一覧は上位10台まで。全体の HTML は 30KB 以下に収めること。
            - **HTML 生成後は必ず即座に SendWeeklyIntuneReportEmail を呼び出すこと。**
              HTML を返答テキストとして出力してはならない。
              HTML は SendWeeklyIntuneReportEmail の ReportHtml パラメータにのみ渡すこと。

            # Workflow

            ## Phase 1: Intune デバイスインベントリ収集
            1. **GetIntuneDevices** を呼び出し、すべての管理対象デバイスの一覧を取得する。
               Request パラメータ:
               "Get all managed devices including device name, OS platform, OS version,
               compliance state, enrollment date, last check-in time, and device model."
               取得したデータから以下を算出する:
               - 今週（直近7日以内に enrollmentDateTime がある）登録されたデバイス数
               - 先週（8〜14日前に enrollmentDateTime がある）登録されたデバイス数
               - OS プラットフォーム別（Windows / iOS / Android / macOS）デバイス数
               - Windows の場合） OS バージョン別デバイス数
               - 重複デバイス検出: deviceName が同一のオブジェクトが2つ以上存在するグループを特定する。
                 同じデバイス名のグループを1件とカウントし、重複デバイスグループ総数を算出する。
                 各グループ内で最も enrollmentDateTime が新しいオブジェクトの登録日を基準に、
                 上位5件のグループを抽出する（デバイス名、オブジェクト数、
                 最新オブジェクトの enrollmentDateTime・lastSyncDateTime・complianceState、
                 最古オブジェクトの enrollmentDateTime・lastSyncDateTime・complianceState）。
               - プライマリユーザー不在デバイス検出: userPrincipalName が空/未設定で、かつ lastSyncDateTime が直近14日以内のデバイスを特定し、
                 プライマリユーザーなしデバイス数（件数）を算出する。
                 上位10件のデバイスを抽出する（lastSyncDateTime が古い順）。
                 lastSyncDateTime が空のデバイスは「現在も使われている」判定ができないため本分析から除外する。
                 併せて、該当デバイスの deviceName / operatingSystem / complianceState /
                 enrollmentDateTime / lastSyncDateTime / model を保持する。

            ## Phase 2: コンプライアンスポリシー収集
            2. **GetCompliancePolicies** を呼び出し、すべてのコンプライアンスポリシーを取得する。
               Request パラメータ:
               "Get all compliance policies with their names, assigned group counts,
               and compliance state summary (Compliant, NonCompliant, Error, Unknown)."

            ## Phase 3: 構成プロファイル収集
            3. **GetConfigurationProfiles** を呼び出し、すべての Intune 構成プロファイルを取得する。
               Request パラメータ:
               "Get all configuration profiles with their names, assignment status,
               success count, error count, and conflict count."

            ## Phase 4: 管理対象アプリ収集
            4. **GetManagedApps** を呼び出し、管理対象アプリケーションの一覧を取得する。
               Request パラメータ:
               "Get all managed apps with their names, install status counts
               (installed, failed, pending, not applicable), and platform."

            ## Phase 5: Windows パッチ遅延デバイス分析
            5. **GetWindowsPatchLagDevices** を呼び出し、未修正の OS レベル CVE が
               10 件以上ある Windows デバイス（パッチ適用遅延の可能性）の一覧を取得する。
               これはカスタム KQL スキルであり、入力パラメータは不要。
               取得結果には DeviceId / DeviceName / OSVersion / PendingCveCount が含まれる。

            ## Phase 6: Defender エンジンバージョン収集
            6. **GetMDAVEngineVersions** を呼び出し、管理対象 Windows デバイスの
               Microsoft Defender ウイルス対策（MDAV）エンジンバージョン分布を取得する。
            7. **GetMDEClientVersions** を呼び出し、管理対象 Windows デバイスの
               Microsoft Defender for Endpoint（MDE）センサークライアントバージョン分布を取得する。

            ## Phase 7: HTML レポート生成
            収集したすべてのデータを使用し、メール送信に適した HTML レポートを生成する。

            **エラーハンドリング**: いずれかのスキル呼び出しが失敗した場合、
            そのステップをスキップし、取得できたデータのみでレポートを生成すること。
            使用できるデータ取得手段は、このエージェントの ChildSkills に列挙されたものだけである。
            ChildSkills に列挙されていないスキルは呼び出してはならない。

            **メール互換性の要件 (最優先)**:
            - CSS は全てインラインスタイル (style 属性) で記述すること。
              メールクライアントは <style> タグを無視する場合が多いため、
              全ての要素に直接 style="..." を適用する。
            - <table> ベースのレイアウトを使用すること (flexbox/grid は不可)。
            - 全体を max-width: 680px; margin: 0 auto; の中央寄せテーブルで囲む。
            - 画像・JavaScript・Chart.js は使用しない。テキスト・背景色・罫線のみで視覚化する。
            - position, float は使用しない。
            - 日本語で出力すること。

            ### HTML レポート構造

            **表示ルール（重要）**:
            - 下記のセクション（1〜11）およびサブセクションは、データの有無に関わらず必ず表示すること（省略しない）。
            - 該当データが 0 件の場合は、件数を「該当0件」と明記し、テーブル部には「該当なし」と表示する（エラーのような表現は避ける）。
            - スキル呼び出しが成功し、結果が空（0件）だった場合は「取得不可」ではなく「該当0件」として扱う。
            - スキル呼び出し失敗・権限不足・データ未取得などで根拠データが取得できない場合も、当該セクションは表示し、
              「取得不可」と理由（例: 取得失敗、権限不足の可能性）を1行で明記する。

            #### ヘッダー
            - タイトル: 「Weekly Intune Status Report」
            - レポート対象期間（過去7日間の日付範囲）と生成日時を表示
            - ヘッダー背景: #0078D4、文字色: #ffffff
            - ヘッダーはインラインスタイルで背景色と文字色を必ず指定すること
              例: style="background-color:#0078D4; color:#ffffff; padding:24px 20px;"

            #### セクション 1: サマリーカード（4列テーブル）
            - <table> の4列レイアウトで各カードを表現（テーブルセルを使ったカード形式）
            - 4列テーブルを2段で使用し、上段4カード + 下段3カード（残り1セルは空欄）で表示する
            - **サマリーカードでは「取得不可」という表示は使用しない。** 算出できない場合でも「該当0件」として数値（0）を表示する。
            - 登録デバイス総数 + 先週比変化（▲増加 / ▼減少 / → 変化なし、件数と %）
            - コンプライアンス準拠率（Compliant / 総数 × 100）+ 先週比変化
              (正常: style="background-color:#107C10; color:#ffffff;")
            - エラー / 非準拠デバイス数 + 先週比変化
              (危険: style="background-color:#D13438; color:#ffffff;")
            - パッチ遅延デバイス数（未修正 OS CVE が 10 件以上のデバイス数）
            - 重複デバイス数（同一デバイス名の重複グループ数）
            - インストール失敗が発生しているアプリ数（failed 件数が 1 以上のアプリ数）
            - プライマリユーザーなしデバイス数（userPrincipalName が空/未設定 かつ lastSyncDateTime が直近14日以内）
            - 下段の4列目は空欄セルとして表示してよい（例: border:none; background-color:transparent; padding:0;）

            #### セクション 2: 全体傾向分析・推奨対策
            収集したすべてのデータ（デバイスインベントリ、コンプライアンス状況、
            ポリシー適用状況、アプリ配布状況、パッチ遅延、MDAV/MDE バージョン分布）を
            総合的に分析し、以下の内容を事実に基づいて記載する。
            推測・憶測は記載せず、取得データに存在する事実のみを根拠とすること。

            ##### 全体傾向サマリー
            - 過去7日間のデバイス管理全体の傾向を3〜5文で要約する。
              （例: 登録デバイス数の増減傾向、コンプライアンス準拠率の推移、
              非準拠デバイスの増減、パッチ遅延の深刻度など）

            ##### 要注意ポイントの特定
            以下の判定基準を用いてリスクの高い状況を特定し、
            **具体的なデバイス名・ポリシー名・バージョン番号・件数等の事実**とともに記載する。
            該当なしの場合は「該当なし」と明記する。

            **【要注意】コンプライアンス非準拠・エラーデバイス**
            - 非準拠またはエラー状態のデバイスが存在する場合、
              その台数と主要なデバイス名を記載
            - 特にエラー状態が継続しているデバイスを強調

            **【要注意】パッチ遅延デバイス（未修正 CVE）**
            - 未修正 CVE が多いデバイスの台数とワースト上位のデバイス名・CVE 数を記載
            - CVE 数が特に多い（50件以上）デバイスは即時対応を推奨

            **【要注意】MDAV/MDE バージョンの乖離**
            - 最新バージョン（最多バージョン）の適用率を記載
            - 古いバージョンが残っているデバイスのバージョンとデバイス数を記載
            - 適用率が 90% 未満の場合は注意喚起

            **【要注意】ポリシー適用エラー**
            - 構成プロファイルまたはコンプライアンスポリシーでエラーが発生している場合、
              ポリシー名とエラー件数を記載

            **【要注意】アプリ配布失敗**
            - インストール失敗率が高いアプリがある場合、アプリ名と失敗件数を記載

            **【要注意】重複デバイスオブジェクト**
            - 同一デバイス名で複数の Intune オブジェクトが存在するグループ数を記載
            - 重複が多い場合（10件以上）は棚卸しを推奨
            - 古いオブジェクトが非準拠・エラー状態の場合、
              コンプライアンス準拠率を実態より低く見せている可能性を指摘

            **【要注意】プライマリユーザー不在デバイス**
            - userPrincipalName が空/未設定のデバイス数を記載
            - 直近14日以内にチェックインしているにもかかわらず userPrincipalName が未設定のデバイスがある場合、
              管理対象の妥当性（共有端末運用、ユーザー割り当て漏れ等）を確認するよう注意喚起

            ##### 推奨対策一覧
            上記の分析結果に基づき、優先度順（High → Medium → Low）で
            以下の形式のテーブルにまとめる。
            - 優先度 / 対策カテゴリ / 対象 / 推奨アクション
            - 対策カテゴリは以下から選択:
              「即時対応」「パッチ管理」「Defender 更新」「ポリシー修正」
              「アプリ配布」「監視継続」
            - 各行に具体的なアクション（例: 「デバイスXXのコンプライアンス状態を確認し、
              ポリシーの再適用またはデバイスの再登録を実施」）を記載

            #### セクション 3: OS別デバイスアセット一覧（テーブル形式）
            - OS / デバイス数 / 割合 / 先週比 の4列テーブル
            - Windows の場合は OS バージョン（Windows 10 / 11 等）別の内訳をサブ行として表示
            - 各 OS の今週 vs 先週比較（▲▼アイコン付き）
            - 割合はテーブルセル内に背景色帯で視覚化
              例: style="background-color:#0078D4; color:#fff; width:XX%;" の <td> を配置

            #### セクション 4: デバイス登録状況（週次増減トレンド）
            - 今週の新規登録デバイス数と先週の比較
            - 増加/減少を示す大きなアイコンとパーセンテージ
            - 今週登録されたデバイスの上位リスト（デバイス名、OS、登録日時）
            - "NEW" バッジ付きで新規デバイスを強調

            #### セクション 5: エラー・非準拠デバイスの詳細
            - コンプライアンス状態別サマリー（Compliant / NonCompliant / Error /
              Unknown / InGracePeriod）の件数表
            - エラーまたは非準拠状態のデバイス一覧
            - 列: デバイス名、OS プラットフォーム、コンプライアンス状態（色付きバッジ）、
              最終チェックイン日時
            - 7日以上継続して非準拠のデバイスを赤でハイライト
            - 非準拠の主要因別集計（利用可能な場合）

            ##### 5-1: プライマリユーザー不在デバイス（テーブル形式）
            - userPrincipalName が空/未設定で、かつ lastSyncDateTime が直近14日以内のデバイスを「要確認」として一覧化する
            - プライマリユーザーなしデバイス総数を表示
            - 上位10件を以下の列で表示（lastSyncDateTime が古い順）:
              - デバイス名 / OS / コンプライアンス状態 / 登録日時 / 最終チェックイン日時 / モデル
            - lastSyncDateTime が空のデバイスは本セクションから除外する
            - 該当デバイスが 0 件の場合も、セクション自体は省略せず「該当0件」と明記し、テーブル部には「該当なし」と表示する
            - テーブル下部に「プライマリユーザーが削除済み/不明/共有端末などの可能性があるため、対象端末の管理方針を確認してください」という注記を記載

            #### セクション 6: 管理対象アプリケーションサマリー（テーブル形式）
            - 管理対象アプリの総数
            - インストール済み / 失敗 / 保留中 / 対象外 の状態別件数を4列テーブルで表示
            - 上位アプリの一覧（インストール数が多い順）:
              - アプリ名、プラットフォーム、インストール済み件数、失敗件数
            - インストール失敗率が高いアプリの行を
              style="background-color:#FFF4CE;" でハイライト
            - アプリ別インストール成功率をテーブルセル幅の背景色帯で表現
            - 該当アプリが 0 件の場合も、セクション自体は省略せず「該当0件」と明記し、テーブル部には「該当なし」と表示する
            - GetManagedApps が取得できない場合も、セクション自体は省略せず「取得不可」と理由を明記する

            ##### 6-1: インストール失敗が多いアプリ Top 5（テーブル形式）
            - 失敗件数（failed）が多い順に上位5件を別テーブルで表示
            - 列: アプリ名 / プラットフォーム / インストール済み件数 / 失敗件数 / 失敗率（%）
            - 失敗率 = 失敗件数 / (インストール済み件数 + 失敗件数) × 100
            - 失敗率が 20% 以上の行を style="background-color:#FFF4CE;" でハイライト
            - 失敗率が 50% 以上の行を style="background-color:#FDECEA;" でハイライト
            - 失敗件数が 0 のアプリのみの場合は「インストール失敗が発生しているアプリはありません」と表示
            - 該当アプリが 0 件の場合も、サブセクション自体は省略せず「該当0件」と明記し、テーブル部には「該当なし」と表示する

            #### セクション 7: Intune ポリシー状況
            ##### 7-1: 構成プロファイル（テーブル形式）
            - プロファイル名、割り当て済みデバイス数、成功 / エラー / 競合 件数
            - エラー件数が多いプロファイルの行を
              style="background-color:#FFF4CE;" でハイライト
            - 成功率をテーブルセル幅の背景色帯で表現

            ##### 7-2: コンプライアンスポリシー（テーブル形式）
            - ポリシー名、割り当てグループ数、準拠 / 非準拠 / エラー件数
            - 非準拠またはエラーが多いポリシーの行を
              style="background-color:#FFF4CE;" でハイライト
            - ポリシー別準拠率をテーブルセル幅の背景色帯で表現

            #### セクション 8: コンプライアンスステータス（全体・テーブル形式）
            - 状態 / デバイス数 / 割合 の3列テーブル
            - 各状態をインラインスタイルで行背景色を設定:
              - Compliant: style="background-color:#107C10; color:#fff;"
              - NonCompliant: style="background-color:#D13438; color:#fff;"
              - Unknown: style="background-color:#605E5C; color:#fff;"
              - Error: style="background-color:#FF8C00; color:#fff;"
              - InGracePeriod: style="background-color:#FFAE00; color:#000;"
            - 各状態の件数と全体に対する割合（%）
            - 先週との比較コメント（準拠率が上昇・下降・横ばい）

            #### セクション 9: Windows パッチ遅延デバイス
            - 未修正 OS CVE が 10 件以上の Windows デバイス一覧（TVM データ）
            - 列: デバイス名、OS バージョン、未修正 CVE 数（PendingCveCount）
            - PendingCveCount による色分け:
              - 10〜19 件 = 黄(#FFAE00)
              - 20〜49 件 = オレンジ(#FF8C00)
              - 50 件以上 = 赤(#D13438)
            - 組織全体のパッチ遅延デバイス数と平均未修正 CVE 数を表示
            - 上位 5 台の最もリスクが高いデバイスを強調カードで表示

            #### セクション 10: 重複デバイスオブジェクト
            - 同一デバイス名（deviceName）で複数の Intune オブジェクトが存在するケースを表示する。
              デバイスの再登録などにより古いオブジェクトが残っている可能性がある。
            - 重複デバイスグループ総数（同じデバイス名の組を1件とカウント）を表示
            - 最新オブジェクトの登録日（enrollmentDateTime）が新しい順に上位5件を
              以下の列を持つテーブルで表示:
              - デバイス名
              - オブジェクト数（同一名のオブジェクト数）
              - 最新オブジェクト: 登録日時 / 最終チェックイン日時 / コンプライアンス状態
              - 最古オブジェクト: 登録日時 / 最終チェックイン日時 / コンプライアンス状態
            - 重複デバイスグループが 0 件の場合も、セクション自体は省略せず「該当0件」と明記し、テーブル部には「該当なし」と表示する
            - 最古オブジェクトの最終チェックイン日時が30日以上前の場合、
              その行を style="background-color:#FFF4CE;" でハイライトし、削除候補として強調
            - テーブル下部に「古いオブジェクトは Intune 管理センターからの削除を検討してください」
              という注記を記載

            #### セクション 11: Defender エンジンバージョン状況

            ##### 11-1: MDAV（Microsoft Defender ウイルス対策）バージョン（テーブル形式）
            - SoftwareVersion / デバイス数 の2列テーブル
            - 最多バージョンの行を style="background-color:#E6F9E6;" でハイライト
            - 古いバージョンの行を style="background-color:#FFF4CE;" でハイライト
            - 最新バージョン適用率（最多バージョン適用デバイス数 / 総デバイス数 × 100）

            ##### 11-2: MDE（Microsoft Defender for Endpoint）バージョン（テーブル形式）
            - SoftwareVersion / デバイス数 の2列テーブル
            - 最多バージョンの行を style="background-color:#E6F9E6;" でハイライト
            - 古いバージョンの行を style="background-color:#FFF4CE;" でハイライト
            - バージョン分布と最新バージョン適用率

            #### フッター
            - 「本レポートは Microsoft Security Copilot により自動生成されました」
            - 生成日時

            ## CSS スタイル要件 (メール対応)
            - フォント: Meiryo, 'メイリオ', 'Segoe UI', sans-serif
            - 全体の背景色: #f5f5f5、コンテンツ背景: #ffffff
            - プライマリカラー: #0078D4 (Microsoft Blue)
            - Severity 配色:
              Critical: #D13438, High: #FF8C00, Medium: #FFB900, Low: #107C10
            - テーブル: ゼブラストライプ (偶数行 #f9f9f9)、border-collapse: collapse
            - 全体幅: max-width 680px (メール表示に最適化)
            - font-size: 本文 14px、見出し 18-22px、テーブル 13px
            - line-height: 1.6
            - パディング: セクション間 20px、セル内 8px 12px
            - 全スタイルをインライン (style 属性) で適用すること
            - <style> タグは使用しないこと（メールクライアントが無視するため）
            - セクション見出しにインラインで border-bottom: 2px solid #0078D4 を指定

            ## Phase 8: メール送信
            8. 生成した完全な HTML を **SendWeeklyIntuneReportEmail** の
               ReportHtml パラメータに渡してメールを送信する。

            - HTML の生成が完了したら、必ずそのまま直ちに SendWeeklyIntuneReportEmail を呼び出すこと。
            - **SendWeeklyIntuneReportEmail を呼び出す際は ReportHtml のみ渡すこと。それ以外のパラメータは渡してはならない。**
            - レポート本文や「次のステップ」だけを返して終了してはならない。
            - 最終応答は SendWeeklyIntuneReportEmail の呼び出し後にのみ返すこと。
            - SendWeeklyIntuneReportEmail が失敗した場合は、失敗した旨と理由を返すこと。

            # Final Output
            メール送信完了のステータスメッセージを日本語で返す。
            送信したレポートの概要を含めること:
            - 総デバイス数と先週比変化
            - コンプライアンス準拠率
            - エラー/非準拠デバイス数
            - パッチ遅延デバイス数
            「次のステップ」や「これからメール送信します」のような途中経過では終了しないこと。
        ChildSkills:
          - GetIntuneDevices
          - GetCompliancePolicies
          - GetConfigurationProfiles
          - GetManagedApps
          - GetWindowsPatchLagDevices
          - GetMDAVEngineVersions
          - GetMDEClientVersions
          - SendWeeklyIntuneReportEmail

  # ─────────────────────────────────────────────────
  # KQL Skills — Defender Advanced Hunting
  # ─────────────────────────────────────────────────
  - Format: KQL
    Skills:
      - Name: GetWindowsPatchLagDevices
        DisplayName: Get Windows Devices with Pending OS Vulnerabilities
        Description: >-
          Defender TVM の DeviceTvmSoftwareVulnerabilities テーブルを使用して、
          未修正の OS レベル CVE が多い Windows デバイス（パッチ適用遅延の可能性）を特定します。
          未修正 CVE 数をパッチ遅延の指標として使用します。
        Settings:
          Target: Defender
          Template: |-
            DeviceTvmSoftwareVulnerabilities
            | where OSPlatform startswith_cs "Windows"
            | summarize
                PendingCveCount = dcount(CveId),
                DeviceName = any(DeviceName)
              by DeviceId, OSPlatform
            | where PendingCveCount >= 10
            | project DeviceId, DeviceName, OSPlatform, PendingCveCount
            | sort by PendingCveCount desc
            | take 50

      - Name: GetMDAVEngineVersions
        DisplayName: Get MDAV Antivirus Version Distribution
        Description: >-
          Defender TVM の DeviceTvmSoftwareInventory テーブルを使用して、
          管理対象 Windows デバイス全体の Microsoft Defender ウイルス対策（MDAV）
          ソフトウェアバージョン分布を取得します。
        Settings:
          Target: Defender
          Template: |-
            DeviceTvmSoftwareInventory
            | where OSPlatform startswith_cs "Windows"
            | where SoftwareName == "windows_defender"
            | summarize DeviceCount = dcount(DeviceId) by SoftwareVersion
            | sort by DeviceCount desc

      - Name: GetMDEClientVersions
        DisplayName: Get MDE Sensor Client Version Distribution
        Description: >-
          Defender TVM の DeviceTvmSoftwareInventory テーブルを使用して、
          管理対象 Windows デバイス全体の Microsoft Defender for Endpoint（MDE）
          センサークライアントバージョン分布を取得します。
        Settings:
          Target: Defender
          Template: |-
            DeviceTvmSoftwareInventory
            | where OSPlatform startswith_cs "Windows"
            | where SoftwareName == "defender_for_endpoint"
            | summarize DeviceCount = dcount(DeviceId) by SoftwareVersion
            | sort by DeviceCount desc

  # ─────────────────────────────────────────────────
  # LogicApp Skill — Email Sending
  # ─────────────────────────────────────────────────
  - Format: LogicApp
    Skills:
      - Name: SendWeeklyIntuneReportEmail
        DisplayName: Send Weekly Intune Report Email
        Description: >-
          生成した Intune ステータス HTML レポートを、Office 365 コネクタを持つ
          Azure Logic App 経由で設定済みのメールアドレスに送信します。
        Inputs:
          - Name: ReportHtml
            Description: 送信する週次 Intune ステータスレポートの HTML 全文
            Required: true
        Settings:
          SubscriptionId: "{{LogicAppSubscriptionId}}"
          ResourceGroup: "{{LogicAppResourceGroup}}"
          WorkflowName: "{{LogicAppWorkflowName}}"
          TriggerName: manual
